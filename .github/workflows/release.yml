name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Install Linux deps
        run: |
          sudo dpkg --add-architecture arm64
          sudo rm -f /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          printf '%s\n' \
            'Types: deb' \
            'URIs: http://archive.ubuntu.com/ubuntu' \
            'Suites: noble noble-updates noble-security' \
            'Components: main restricted universe multiverse' \
            'Architectures: amd64' \
            '' \
            'Types: deb' \
            'URIs: http://ports.ubuntu.com/ubuntu-ports' \
            'Suites: noble noble-updates noble-security' \
            'Components: main universe multiverse' \
            'Architectures: arm64' \
            | sudo tee /etc/apt/sources.list.d/pinned.sources > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev \
            gcc-aarch64-linux-gnu \
            libasound2-dev:arm64

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos-intel:
    needs: goreleaser
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build macOS (amd64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%d)" \
            -o muscle-cli-darwin-amd64 .

      - name: Package archive
        run: |
          mkdir -p build/muscle-cli_macOS_x86_64
          cp muscle-cli-darwin-amd64 build/muscle-cli_macOS_x86_64/muscle-cli
          cp README.md build/muscle-cli_macOS_x86_64/
          cd build && tar czf ../muscle-cli_macOS_x86_64.tar.gz muscle-cli_macOS_x86_64

      - name: Upload artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" muscle-cli_macOS_x86_64.tar.gz

  macos-arm:
    needs: goreleaser
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build macOS (arm64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%d)" \
            -o muscle-cli-darwin-arm64 .

      - name: Package archive
        run: |
          mkdir -p build/muscle-cli_macOS_arm64
          cp muscle-cli-darwin-arm64 build/muscle-cli_macOS_arm64/muscle-cli
          cp README.md build/muscle-cli_macOS_arm64/
          cd build && tar czf ../muscle-cli_macOS_arm64.tar.gz muscle-cli_macOS_arm64

      - name: Upload artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" muscle-cli_macOS_arm64.tar.gz
