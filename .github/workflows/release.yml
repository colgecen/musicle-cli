name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Install Linux deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libasound2-dev

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux-arm64:
    needs: goreleaser
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build linux/arm64 via QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/build" -w /build \
            -e CGO_ENABLED=1 \
            arm64v8/ubuntu:24.04 /bin/bash -c "
              apt-get update -qq && apt-get install -y -qq ca-certificates golang-go libasound2-dev
              go build -ldflags='-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${{ github.sha }} -X main.date=\$(date -u +%Y-%m-%d)' \
                -o muscle-cli-linux-arm64 .
            "

      - name: Package archive
        run: |
          mkdir -p build/muscle-cli_Linux_arm64
          cp muscle-cli-linux-arm64 build/muscle-cli_Linux_arm64/muscle-cli
          cp README.md build/muscle-cli_Linux_arm64/
          cd build && tar czf ../muscle-cli_Linux_arm64.tar.gz muscle-cli_Linux_arm64

      - name: Upload artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" muscle-cli_Linux_arm64.tar.gz

  appimage:
    needs: goreleaser
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev libfuse2 desktop-file-utils

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: Build binary
        run: |
          CGO_ENABLED=1 go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%d)" \
            -o muscle-cli-linux-x86_64.AppDir/usr/bin/musicle-cli .

      - name: Prepare AppDir
        run: |
          APPDIR=muscle-cli-linux-x86_64.AppDir
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/1024x1024/apps"
          mkdir -p "$APPDIR/usr/share/metainfo"

          cp appimage/io.anomalyco.musicle-cli.desktop "$APPDIR/usr/share/applications/"
          cp appimage/io.anomalyco.musicle-cli.desktop "$APPDIR/"
          cp assets/MusicLe.png "$APPDIR/usr/share/icons/hicolor/1024x1024/apps/io.anomalyco.musicle-cli.png"
          cp assets/MusicLe.png "$APPDIR/io.anomalyco.musicle-cli.png"
          cp appimage/io.anomalyco.musicle-cli.appdata.xml "$APPDIR/usr/share/metainfo/"

          desktop-file-validate "$APPDIR/io.anomalyco.musicle-cli.desktop"

      - name: Build AppImage
        run: |
          ./appimagetool -n muscle-cli-linux-x86_64.AppDir \
            "musicle-cli_${GITHUB_REF_NAME#v}_x86_64.AppImage"

      - name: Upload AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" muscle-cli_*.AppImage

  macos-intel:
    needs: goreleaser
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build macOS (amd64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%d)" \
            -o muscle-cli-darwin-amd64 .

      - name: Package archive
        run: |
          mkdir -p build/muscle-cli_macOS_x86_64
          cp muscle-cli-darwin-amd64 build/muscle-cli_macOS_x86_64/muscle-cli
          cp README.md build/muscle-cli_macOS_x86_64/
          cd build && tar czf ../muscle-cli_macOS_x86_64.tar.gz muscle-cli_macOS_x86_64

      - name: Upload artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" muscle-cli_macOS_x86_64.tar.gz

  macos-arm:
    needs: goreleaser
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build macOS (arm64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%d)" \
            -o muscle-cli-darwin-arm64 .

      - name: Package archive
        run: |
          mkdir -p build/muscle-cli_macOS_arm64
          cp muscle-cli-darwin-arm64 build/muscle-cli_macOS_arm64/muscle-cli
          cp README.md build/muscle-cli_macOS_arm64/
          cd build && tar czf ../muscle-cli_macOS_arm64.tar.gz muscle-cli_macOS_arm64

      - name: Upload artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" muscle-cli_macOS_arm64.tar.gz
