name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-3-dev libglib2.0-dev

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -v ./...

      - name: Go build
        run: go build -v ./...

      - name: Python syntax check
        run: python -m compileall engine/

      - name: Python test
        run: python -m unittest discover -s engine -p "test_*.py" -v
