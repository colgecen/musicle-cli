name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build -o musicle${{ matrix.os == 'windows-latest' && '.exe' || '' }} .

      - name: Python syntax check
        run: python -m py_compile engine/main.py engine/playlist.py engine/metadata.py engine/download.py engine/play.py engine/image.py
